# SuperForge KIT SRAM-Enabled LoROM Linker Configuration for ca65/ld65
# (kit-owned: lorom.cfg + the battery-SRAM region, per lorom.cfg's own recipe)
#
# Memory map for a 32KB LoROM SNES cartridge WITH 8KB battery SRAM.
#
# SNES LoROM layout:
#   ROM banks: $00-$7D, $80-$FF : $8000-$FFFF
#   WRAM:      $7E              : $0000-$FFFF
#              $7F              : $0000-$FFFF
#   SRAM:      $70              : $0000-$1FFF (8KB, battery-backed)
#
# Internal header at $00FFC0 (file offset $7FC0)
# Vectors at $00FFE0 (file offset $7FE0)
#
# THE HEADER STORY (verified on the emulator, S7 M2 run-gate):
#   The kit's stock header.inc ALREADY declares cartridge type $02
#   (ROM + SRAM) at $FFD6 and SRAM size $03 (8KB) at $FFD8 — those two
#   header bytes are what the emulator reads to size and battery-persist
#   SRAM. No header variant is needed: link any ROM with this cfg and the
#   $70:0000-$70:1FFF window is live and persisted to <home>/Saves/<rom>.srm
#   on ROM unload/exit (the run-gate tests/test_save.py proves a hard
#   power-cycle round-trip). The plain lorom.cfg ROMs simply never touch
#   the window; the header bytes are inert for them.
#
# The save/load engine (engine/save_load_engine.asm, front door
# lib/macros/sf_save.inc) accesses SRAM via 24-bit long addressing
# (f:$700000,x) — no linker segment is required for it. The optional
# SRAMDATA segment below is for games that want symbolic labels in SRAM
# (.segment "SRAMDATA" / label: .res N); `optional = yes` keeps ld65
# quiet when no module uses it.
#
# A game that needs battery saves AND the TAD audio banks links with
# lorom_tad_sram.cfg -- lorom_tad.cfg plus the SRAM window below, composed
# exactly the way this file extended lorom.cfg.

MEMORY {
    # Zero page (Direct Page) — 256 bytes
    ZP:     start = $00,      size = $0100, type = rw, define = yes;

    # WRAM (CPU stack + general RAM)
    RAM:    start = $0100,    size = $1F00, type = rw, define = yes;

    # Battery SRAM: $70:0000-$70:1FFF (8KB = header SRAM-size byte $03)
    SRAM:   start = $700000,  size = $2000, type = rw, define = yes;

    # Main ROM bank: $008000-$00FFBF (code + data, 32,192 bytes)
    ROM:    start = $008000,  size = $7FC0, type = ro, file = %O, fill = yes, fillval = $00;

    # Internal ROM header: $00FFC0-$00FFDF (32 bytes)
    ROMH:   start = $00FFC0,  size = $0020, type = ro, file = %O, fill = yes;

    # Interrupt vectors: $00FFE0-$00FFFF (32 bytes)
    ROMV:   start = $00FFE0,  size = $0020, type = ro, file = %O, fill = yes;
}

SEGMENTS {
    ZEROPAGE:   load = ZP,    type = zp;
    BSS:        load = RAM,   type = bss;
    SRAMDATA:   load = SRAM,  type = bss, optional = yes;
    CODE:       load = ROM,   type = ro,  define = yes;
    RODATA:     load = ROM,   type = ro;
    HEADER:     load = ROMH,  type = ro;
    VECTORS:    load = ROMV,  type = ro;
}
