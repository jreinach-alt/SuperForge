# SuperForge LoROM Linker Configuration for ca65/ld65 (KIT-OWNED)
#
# Memory map for a 32KB LoROM SNES cartridge.
#
# SNES LoROM layout:
#   ROM banks: $00-$7D, $80-$FF : $8000-$FFFF
#   WRAM:      $7E              : $0000-$FFFF
#              $7F              : $0000-$FFFF
#
# Internal header at $00FFC0 (file offset $7FC0)
# Vectors at $00FFE0 (file offset $7FE0)
#
# No SRAM region: the kit's ROMs are battery-less (header marks no SRAM).
# If your game needs battery saves, add
#     SRAM: start = $700000, size = $2000, type = rw, define = yes;
# to MEMORY, an `SRAMDATA: load = SRAM, type = bss;` segment, and bump the
# header's SRAM-size byte — and expect ld65 to warn until a .segment
# "SRAMDATA" actually exists in your code.

MEMORY {
    # Zero page (Direct Page) — 256 bytes
    ZP:     start = $00,      size = $0100, type = rw, define = yes;

    # WRAM (CPU stack + general RAM)
    RAM:    start = $0100,    size = $1F00, type = rw, define = yes;

    # Main ROM bank: $008000-$00FFBF (code + data, 32,192 bytes)
    ROM:    start = $008000,  size = $7FC0, type = ro, file = %O, fill = yes, fillval = $00;

    # Internal ROM header: $00FFC0-$00FFDF (32 bytes)
    ROMH:   start = $00FFC0,  size = $0020, type = ro, file = %O, fill = yes;

    # Interrupt vectors: $00FFE0-$00FFFF (32 bytes)
    ROMV:   start = $00FFE0,  size = $0020, type = ro, file = %O, fill = yes;
}

SEGMENTS {
    ZEROPAGE:   load = ZP,    type = zp;
    BSS:        load = RAM,   type = bss;
    CODE:       load = ROM,   type = ro,  define = yes;
    RODATA:     load = ROM,   type = ro;
    HEADER:     load = ROMH,  type = ro;
    VECTORS:    load = ROMV,  type = ro;
}
