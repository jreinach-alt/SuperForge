# SuperForge KIT TAD-Enabled LoROM Linker Configuration for ca65/ld65
# (kit-owned: TAD_BSS relocated vs the parent config — see comment below)
#
# Memory map for a 96KB LoROM SNES cartridge with dedicated audio
# data banks for the TAD (Terrific Audio Driver). No SRAM region —
# a game that needs audio AND battery saves links with lorom_tad_sram.cfg
# (this config + the SRAM window, composed the way lorom_sram.cfg extended
# lorom.cfg; the header story lives in those two files). Keep this file and
# lorom_tad_sram.cfg in lockstep: a memory-map edit here belongs there too.
#
# SNES LoROM layout:
#   ROM banks: $00-$7D, $80-$FF : $8000-$FFFF (32KB per bank)
#   WRAM:      $7E              : $0000-$FFFF
#              $7F              : $0000-$FFFF
#
# Mapping mode: $20 (LoROM)
#
# Bank layout (3 banks, 96KB total):
#   Bank $00:  Main code + ROM header + vectors (32KB)
#   Bank $01:  TAD audio data bank 0 (32KB)
#   Bank $02:  TAD audio data bank 1 (32KB)
#
# Internal header at $00:FFC0 (file offset $7FC0)
# Vectors at $00:FFE0 (file offset $7FE0)
#
# IMPORTANT: TAD's BSS and ZEROPAGE variables are placed in dedicated
# memory regions that do NOT overlap with SuperForge's engine state
# ($0100-$01BF) or register file ($00-$AF). Without this separation,
# TAD's private state (TadPrivate_state, data transfer pointers, etc.)
# gets corrupted by the NMI handler writing to NMI_DONE_FLAG, FRAME_PHASE,
# etc. at the same addresses, causing the TAD loader to hang in LOADING
# state permanently.

MEMORY {
    # Zero page (Direct Page) -- 256 bytes for register file
    # SuperForge uses $00-$AF for registers, API block, engine scratch.
    # $B0-$FF is engine cache — $FE-$FF reserved for TAD SFX queue.
    ZP:     start = $00,      size = $00FE, type = rw, define = yes;

    # TAD zero-page variables (Tad_sfxQueue_sfx, Tad_sfxQueue_pan)
    # Placed at $FE-$FF to avoid conflict with register file ($00-$AF)
    # and engine cache ($B0-$FD).
    TAD_ZP: start = $FE,      size = $0002, type = rw, define = yes;

    # WRAM (CPU stack + general RAM)
    # Starts after engine state ($0100-$01BF). Ends at $1DDF so it can
    # never double-book the TAD_BSS bytes below (audit-1 F2 fix — the
    # parent-era $1F00 size silently overlapped $1DE0-$1DFF).
    RAM:    start = $0100,    size = $1CE0, type = rw, define = yes;

    # TAD BSS variables (Tad_flags, TadPrivate_state, transfer pointers, etc.)
    # 18 bytes, placed at $1DE0-$1DFF: the TAIL of the kit's game-array
    # region ($1800-$1DFF — see lib/macros/README.md "Game memory contract").
    # The parent's $0520 placement collides with the text engine's VWF
    # scratch ($0520-$0527) and the kit's macro scratch ($0530-$053D)
    # — KIT-OWNED relocation, do not copy the parent value back.
    TAD_BSS: start = $1DE0,   size = $0020, type = rw, define = yes;

    # Bank 0: Main code ($00:8000-$00:FFBF, 32,192 bytes)
    ROM0:   start = $008000,  size = $7FC0, type = ro, file = %O, fill = yes, fillval = $00;

    # Internal ROM header ($00:FFC0-$00:FFDF, 32 bytes)
    ROMH:   start = $00FFC0,  size = $0020, type = ro, file = %O, fill = yes;

    # Interrupt vectors ($00:FFE0-$00:FFFF, 32 bytes)
    ROMV:   start = $00FFE0,  size = $0020, type = ro, file = %O, fill = yes;

    # Bank 1: TAD audio data bank 0 ($01:8000-$01:FFFF, 32KB)
    ROM1:   start = $018000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;

    # Bank 2: TAD audio data bank 1 ($02:8000-$02:FFFF, 32KB)
    ROM2:   start = $028000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE:     load = TAD_ZP, type = zp;
    BSS:          load = TAD_BSS, type = bss;
    CODE:         load = ROM0,  type = ro,  define = yes;
    RODATA:       load = ROM0,  type = ro;
    HEADER:       load = ROMH,  type = ro;
    VECTORS:      load = ROMV,  type = ro;
    AUDIO_DATA0:  load = ROM1,  type = ro,  define = yes;
    # optional: the shipped example song set fits in bank 1; a bigger TAD
    # project spills its data here without a config edit (tad-compiler
    # emits AUDIO_DATA1 only when needed).
    AUDIO_DATA1:  load = ROM2,  type = ro,  define = yes, optional = yes;
}
