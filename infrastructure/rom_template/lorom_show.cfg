# SuperForge KIT all-modes SHOWCASE Linker Configuration (lorom_show.cfg)
#
# Kit-owned linker config for the mode_showcase ALL-MODES instrument (S1.5
# dispatch layer + the S2..Sn per-mode fan-out). A GENEROUS 256KB LoROM
# cartridge (8 banks) WITH battery SRAM — sized so the fan-out (8 real per-mode
# pages + the Mode-7 engine + its PV LUTs + per-page CHR/LUT data) NEVER has to
# resize the cfg. S1 used the lean 32KB lorom_sram.cfg (Mode-1 only); the
# all-modes ROM keeps CODE/RODATA in bank 0 and gives the fan-out spare data
# banks (BANK1..BANK7) for bulky per-mode assets.
#
# Bank layout:
#   Bank $00 (CODE/RODATA/HEADER/VECTORS): engine + macros + main + dispatch +
#            all 8 pages' procs/tables/strings. ~17KB used at S1.5; ~32KB cap.
#   Banks $01-$07 (BANK1..BANK7): spare data banks for the fan-out (Mode-7 PV
#            LUTs, per-mode CHR/tilemap/palette blobs). A page that needs one
#            puts data in `.segment "BANKn"` and reaches it with 24-bit (f:)
#            addressing. Optional => ld65 stays quiet when unused.
#   SRAM $70:0000-$70:1FFF (8KB): the record screen's 4 save slots (sf_save).
#
# Header bytes (infrastructure/rom_template/header.inc): cart type $02 (ROM+SRAM)
# and SRAM size $03 (8KB) already declared; ROM size byte $08 (256KB) already
# matches this image. Selected via the kit "; LDCFG: lorom_show.cfg" sentinel
# (the Makefile's sf_ldcfg reads it; no Makefile edit needed). Mapping mode $30
# (LoROM + FastROM, per header.inc).

MEMORY {
    # Zero page (Direct Page) — 256 bytes
    ZP:     start = $00,      size = $0100, type = rw, define = yes;

    # WRAM (CPU stack + general RAM)
    RAM:    start = $0100,    size = $1F00, type = rw, define = yes;

    # Battery SRAM: $70:0000-$70:1FFF (8KB = header SRAM-size byte $03)
    SRAM:   start = $700000,  size = $2000, type = rw, define = yes;

    # Bank 0: Main code + data ($00:8000-$00:FFBF, 32,192 bytes)
    ROM0:   start = $008000,  size = $7FC0, type = ro, file = %O, fill = yes, fillval = $00;

    # Internal ROM header ($00:FFC0-$00:FFDF, 32 bytes)
    ROMH:   start = $00FFC0,  size = $0020, type = ro, file = %O, fill = yes;

    # Interrupt vectors ($00:FFE0-$00:FFFF, 32 bytes)
    ROMV:   start = $00FFE0,  size = $0020, type = ro, file = %O, fill = yes;

    # Banks 1-7: spare data banks for the fan-out (each $nn:8000-$nn:FFFF, 32KB)
    ROM1:   start = $018000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM2:   start = $028000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM3:   start = $038000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM4:   start = $048000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM5:   start = $058000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM6:   start = $068000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM7:   start = $078000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE:   load = ZP,    type = zp;
    BSS:        load = RAM,   type = bss;
    SRAMDATA:   load = SRAM,  type = bss, optional = yes;
    CODE:       load = ROM0,  type = ro,  define = yes;
    RODATA:     load = ROM0,  type = ro;
    HEADER:     load = ROMH,  type = ro;
    VECTORS:    load = ROMV,  type = ro;
    BANK1:      load = ROM1,  type = ro,  define = yes, optional = yes;
    BANK2:      load = ROM2,  type = ro,  define = yes, optional = yes;
    BANK3:      load = ROM3,  type = ro,  define = yes, optional = yes;
    BANK4:      load = ROM4,  type = ro,  define = yes, optional = yes;
    BANK5:      load = ROM5,  type = ro,  define = yes, optional = yes;
    BANK6:      load = ROM6,  type = ro,  define = yes, optional = yes;
    BANK7:      load = ROM7,  type = ro,  define = yes, optional = yes;
}
