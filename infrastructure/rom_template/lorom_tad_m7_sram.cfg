# SuperForge KIT TAD + Mode-7-map + battery-SRAM LoROM Linker Config (KIT-OWNED)
#
# Memory map for a LoROM SNES cartridge that needs ALL THREE of: the TAD audio
# banks, a dedicated 32KB bank for a Mode 7 interleaved map blob (BANK1), AND
# 8KB battery SRAM for saves. This is lorom_tad_m7.cfg with the SRAM window
# added exactly the way lorom_tad_sram.cfg added it to lorom_tad.cfg — keep the
# THREE in lockstep (an edit to the shared memory map belongs in all three).
#
# The rpg template is the worked example: a Mode 7 overworld (32KB map in BANK1)
# with music persisting across the scene swap (TAD audio) AND a save point that
# writes scene+position to SRAM slot 0 (sf_save), auto-loaded on boot.
#
# THE HEADER STORY (verbatim from lorom_tad_sram.cfg / lorom_sram.cfg): the kit's
# stock header.inc ALREADY declares cartridge type $02 (ROM + SRAM) at $FFD6 and
# SRAM size $03 (8KB) at $FFD8 — those two header bytes are what the emulator
# reads to size + battery-persist SRAM to <home>/Saves/<rom>.srm on ROM unload.
# No header variant is needed: link with this cfg and the $70:0000-$70:1FFF
# window is live and persisted. The save/load engine accesses SRAM via 24-bit
# long addressing, so the SRAM MEMORY region below only feeds the optional
# SRAMDATA segment (symbolic labels in SRAM); `optional = yes` keeps ld65 quiet
# when unused.
#
# Bank layout (4 banks, 128KB total):
#   Bank $00:  Main code + ROM header + vectors (32KB)
#   Bank $01:  Mode 7 interleaved map blob (BANK1 segment, 32KB)
#   Bank $02:  TAD audio data bank 0 (32KB)
#   Bank $03:  bulk read-only game data (COLLISION segment, 32KB)
#   SRAM $70:  8KB battery-backed save data

MEMORY {
    # Zero page — $00-$FD register file/API/scratch; $FE-$FF = TAD SFX queue.
    ZP:     start = $00,      size = $00FE, type = rw, define = yes;
    TAD_ZP: start = $FE,      size = $0002, type = rw, define = yes;

    # WRAM (CPU stack + general RAM). Ends at $1DDF so it never double-books
    # the TAD_BSS bytes (same fix as lorom_tad.cfg).
    RAM:    start = $0100,    size = $1CE0, type = rw, define = yes;

    # TAD BSS (32 bytes) at the tail of the game-array region ($1DE0-$1DFF).
    TAD_BSS: start = $1DE0,   size = $0020, type = rw, define = yes;

    # Battery SRAM: $70:0000-$70:1FFF (8KB = header SRAM-size byte $03)
    SRAM:   start = $700000,  size = $2000, type = rw, define = yes;

    # Bank 0: Main code ($00:8000-$00:FFBF, 32,192 bytes)
    ROM0:   start = $008000,  size = $7FC0, type = ro, file = %O, fill = yes, fillval = $00;

    # Internal ROM header ($00:FFC0-$00:FFDF, 32 bytes)
    ROMH:   start = $00FFC0,  size = $0020, type = ro, file = %O, fill = yes;

    # Interrupt vectors ($00:FFE0-$00:FFFF, 32 bytes)
    ROMV:   start = $00FFE0,  size = $0020, type = ro, file = %O, fill = yes;

    # Bank 1: Mode 7 map blob ($01:8000-$01:FFFF, 32KB)
    ROM1:   start = $018000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;

    # Bank 2: TAD audio data bank 0 ($02:8000-$02:FFFF, 32KB)
    ROM2:   start = $028000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;

    # Bank 3: bulk read-only game data ($03:8000-$03:FFFF, 32KB). The rpg
    # template parks its 16KB parallel collision/terrain table here (COLLISION
    # segment). Read with `lda f:ovw_collision,x` (long addressing — ld65 fills
    # the real bank), so the table works from any bank.
    ROM3:   start = $038000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE:     load = TAD_ZP, type = zp;
    BSS:          load = TAD_BSS, type = bss;
    SRAMDATA:     load = SRAM,  type = bss, optional = yes;
    CODE:         load = ROM0,  type = ro,  define = yes;
    RODATA:       load = ROM0,  type = ro;
    HEADER:       load = ROMH,  type = ro;
    VECTORS:      load = ROMV,  type = ro;
    BANK1:        load = ROM1,  type = ro,  define = yes;
    AUDIO_DATA0:  load = ROM2,  type = ro,  define = yes;
    AUDIO_DATA1:  load = ROM2,  type = ro,  define = yes, optional = yes;
    COLLISION:    load = ROM3,  type = ro,  define = yes, optional = yes;
}
