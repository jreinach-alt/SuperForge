# SuperForge KIT TAD+SRAM LoROM Linker Configuration for ca65/ld65
# (kit-owned: lorom_tad.cfg + the battery-SRAM region, composed exactly the
# way lorom_sram.cfg extended lorom.cfg — see both of those headers)
#
# Memory map for a 96KB LoROM SNES cartridge with the TAD audio data banks
# AND 8KB battery SRAM. This is the build shape for a game that ships both
# music (sf_audio.inc) and battery saves (sf_save.inc) — the platformer
# flagship's v3 save/continue feature is the proving ROM.
#
# SNES LoROM layout:
#   ROM banks: $00-$7D, $80-$FF : $8000-$FFFF (32KB per bank)
#   WRAM:      $7E              : $0000-$FFFF
#              $7F              : $0000-$FFFF
#   SRAM:      $70              : $0000-$1FFF (8KB, battery-backed)
#
# Mapping mode: $20 (LoROM)
#
# Bank layout (3 banks, 96KB total):
#   Bank $00:  Main code + ROM header + vectors (32KB)
#   Bank $01:  TAD audio data bank 0 (32KB)
#   Bank $02:  TAD audio data bank 1 (32KB)
#
# THE HEADER STORY (same as lorom_sram.cfg, verified on the emulator by the
# S7 M2 run-gate): the kit's stock header.inc ALREADY declares cartridge
# type $02 (ROM + SRAM) at $FFD6 and SRAM size $03 (8KB) at $FFD8 — those
# two header bytes are what the emulator reads to size and battery-persist
# SRAM. No header variant is needed: link with this cfg and the
# $70:0000-$70:1FFF window is live and persisted to <home>/Saves/<rom>.srm
# on ROM unload (tests/test_save.py proves the hard power-cycle round trip;
# tests/test_platformer_v3.py proves it through a full game's save/continue
# flow). The save/load engine accesses SRAM via 24-bit long addressing, so
# the SRAM MEMORY region below only feeds the optional SRAMDATA segment
# (symbolic labels in SRAM); `optional = yes` keeps ld65 quiet when unused.
#
# The TAD placement notes (TAD_ZP at $FE, TAD_BSS at $1DE0, the RAM-region
# size that can never double-book TAD_BSS) are inherited VERBATIM from
# lorom_tad.cfg — read that header for why each one is load-bearing. Keep
# the two files in lockstep: an edit to lorom_tad.cfg's memory map belongs
# here too.

MEMORY {
    # Zero page (Direct Page) -- 256 bytes for register file
    # SuperForge uses $00-$AF for registers, API block, engine scratch.
    # $B0-$FF is engine cache — $FE-$FF reserved for TAD SFX queue.
    ZP:     start = $00,      size = $00FE, type = rw, define = yes;

    # TAD zero-page variables (Tad_sfxQueue_sfx, Tad_sfxQueue_pan)
    TAD_ZP: start = $FE,      size = $0002, type = rw, define = yes;

    # WRAM (CPU stack + general RAM) — ends at $1DDF so it can never
    # double-book the TAD_BSS bytes below (see lorom_tad.cfg).
    RAM:    start = $0100,    size = $1CE0, type = rw, define = yes;

    # TAD BSS variables — the TAIL of the kit's game-array region
    # ($1800-$1DFF); kit-owned relocation, see lorom_tad.cfg.
    TAD_BSS: start = $1DE0,   size = $0020, type = rw, define = yes;

    # Battery SRAM: $70:0000-$70:1FFF (8KB = header SRAM-size byte $03)
    SRAM:   start = $700000,  size = $2000, type = rw, define = yes;

    # Bank 0: Main code ($00:8000-$00:FFBF, 32,192 bytes)
    ROM0:   start = $008000,  size = $7FC0, type = ro, file = %O, fill = yes, fillval = $00;

    # Internal ROM header ($00:FFC0-$00:FFDF, 32 bytes)
    ROMH:   start = $00FFC0,  size = $0020, type = ro, file = %O, fill = yes;

    # Interrupt vectors ($00:FFE0-$00:FFFF, 32 bytes)
    ROMV:   start = $00FFE0,  size = $0020, type = ro, file = %O, fill = yes;

    # Bank 1: TAD audio data bank 0 ($01:8000-$01:FFFF, 32KB)
    ROM1:   start = $018000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;

    # Bank 2: TAD audio data bank 1 ($02:8000-$02:FFFF, 32KB)
    ROM2:   start = $028000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE:     load = TAD_ZP, type = zp;
    BSS:          load = TAD_BSS, type = bss;
    SRAMDATA:     load = SRAM,  type = bss, optional = yes;
    CODE:         load = ROM0,  type = ro,  define = yes;
    RODATA:       load = ROM0,  type = ro;
    HEADER:       load = ROMH,  type = ro;
    VECTORS:      load = ROMV,  type = ro;
    AUDIO_DATA0:  load = ROM1,  type = ro,  define = yes;
    AUDIO_DATA1:  load = ROM2,  type = ro,  define = yes, optional = yes;
}
