# SuperForge KIT 512KB LoROM Linker Configuration (lorom_stream.cfg)
#
# Kit-owned linker config for the Mode 7 2-axis streaming rail (Streaming rail
# v2). A 512KB LoROM cartridge (16 banks) — bigger than the kit's 32/64/128KB
# configs because the FLAT multi-bank tilemap + world-space collision table
# need dedicated banks beyond bank 0/1.
#
# Streaming-rail bank layout (the mode7_stream_test ROM uses these segments):
#   Bank $00 (CODE/RODATA/HEADER/VECTORS):  engine + macros + main + palette
#   Bank $01 (BANK1):  world_seed.bin — 32KB interleaved initial 128x128 window
#   Bank $02-$03 (BANK2/BANK3):  flat tilemap (2 banks x 32KB) — STREAMS in.
#                                FLAT bank base = 2 (row>>7 + 2 selects the bank)
#   Bank $04-$05 (BANK4/BANK5):  world-space collision table (64KB, 256x256)
#   Bank $06-$0F:  reserved / spare for a larger world (up to ~512x512)
#
# Selected via the kit "; LDCFG: lorom_stream.cfg" sentinel. Mapping mode: $20.

MEMORY {
    ZP:     start = $00,      size = $0100, type = rw, define = yes;
    RAM:    start = $0100,    size = $1F00, type = rw, define = yes;
    SRAM:   start = $700000,  size = $0800, type = rw, define = yes;

    # Bank 0: Main code
    ROM0:   start = $008000,  size = $7FC0, type = ro, file = %O, fill = yes, fillval = $00;
    ROMH:   start = $00FFC0,  size = $0020, type = ro, file = %O, fill = yes;
    ROMV:   start = $00FFE0,  size = $0020, type = ro, file = %O, fill = yes;

    # Banks 1-15
    ROM1:   start = $018000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM2:   start = $028000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM3:   start = $038000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM4:   start = $048000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM5:   start = $058000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM6:   start = $068000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM7:   start = $078000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM8:   start = $088000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM9:   start = $098000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROMA:   start = $0A8000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROMB:   start = $0B8000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROMC:   start = $0C8000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROMD:   start = $0D8000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROME:   start = $0E8000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROMF:   start = $0F8000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE:   load = ZP,    type = zp;
    BSS:        load = RAM,   type = bss;
    SRAMDATA:   load = SRAM,  type = bss,  optional = yes;
    CODE:       load = ROM0,  type = ro,   define = yes;
    RODATA:     load = ROM0,  type = ro;
    HEADER:     load = ROMH,  type = ro;
    VECTORS:    load = ROMV,  type = ro;
    BANK1:      load = ROM1,  type = ro,   define = yes, optional = yes;
    BANK2:      load = ROM2,  type = ro,   define = yes, optional = yes;
    BANK3:      load = ROM3,  type = ro,   define = yes, optional = yes;
    BANK4:      load = ROM4,  type = ro,   define = yes, optional = yes;
    BANK5:      load = ROM5,  type = ro,   define = yes, optional = yes;
    BANK6:      load = ROM6,  type = ro,   define = yes, optional = yes;
    BANK7:      load = ROM7,  type = ro,   define = yes, optional = yes;
    BANK8:      load = ROM8,  type = ro,   define = yes, optional = yes;
    BANK9:      load = ROM9,  type = ro,   define = yes, optional = yes;
    BANKA:      load = ROMA,  type = ro,   define = yes, optional = yes;
    BANKB:      load = ROMB,  type = ro,   define = yes, optional = yes;
    BANKC:      load = ROMC,  type = ro,   define = yes, optional = yes;
    BANKD:      load = ROMD,  type = ro,   define = yes, optional = yes;
    BANKE:      load = ROME,  type = ro,   define = yes, optional = yes;
    BANKF:      load = ROMF,  type = ro,   define = yes, optional = yes;
}
