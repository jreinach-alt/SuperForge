# SuperForge KIT TAD + 2-axis-streaming LoROM Linker Configuration (KIT-OWNED)
#
# Memory map for a 512KB LoROM cartridge that needs BOTH the Mode 7 2-axis
# streaming banks (a seed bank + a multi-bank FLAT tilemap) AND the TAD
# (Terrific Audio Driver) audio data. The mode7_explore rail is the worked
# example: a streaming overworld (banks 1-9) with overworld music.
#
# This is lorom_stream.cfg with the TAD memory placement folded in: the flat
# streaming banks keep banks 1-9, and the TAD audio data lands in bank $0A
# (the first spare bank the streaming layout leaves free). Keep the ZP / RAM /
# TAD_ZP / TAD_BSS placement IN LOCKSTEP with lorom_tad.cfg (the notes below are
# inherited VERBATIM) — only the ROM bank assignment of the audio data differs.
#
# Streaming + audio bank layout (512KB, 16 banks):
#   Bank $00 (CODE/RODATA/HEADER/VECTORS):  engine + macros + main + palette
#   Bank $01 (BANK1):  explore_seed.bin — 32KB interleaved initial 128x128 window
#   Bank $02-$09 (BANK2..BANK9):  the FLAT streaming tilemap (8 banks x 32KB =
#                                 256KB, 512x512). FLAT bank base = 2.
#   Bank $0A (AUDIO_DATA0):  TAD audio data bank 0 (the ~27KB shipped song set)
#   Bank $0B (AUDIO_DATA1):  TAD audio data bank 1 (optional — a bigger song set)
#   Bank $0C-$0F:  reserved / spare for a larger world
#
# Selected via the kit "; LDCFG: lorom_tad_stream.cfg" sentinel. A *_tad*.cfg
# name also pulls the TAD audio objects + the audio include path into the
# generic templates build rule (see the Makefile), so no Makefile edit is
# needed. Mapping mode: $20 (LoROM).

MEMORY {
    # Zero page — $00-$FD register file/API/scratch; $FE-$FF = TAD SFX queue.
    ZP:     start = $00,      size = $00FE, type = rw, define = yes;

    # TAD zero-page variables (Tad_sfxQueue_sfx, Tad_sfxQueue_pan). Placed at
    # $FE-$FF to avoid conflict with the register file ($00-$AF) and engine
    # cache ($B0-$FD).
    TAD_ZP: start = $FE,      size = $0002, type = rw, define = yes;

    # WRAM (CPU stack + general RAM). Starts after engine state ($0100-$01BF).
    # Ends at $1DDF so it can never double-book the TAD_BSS bytes below (audit-1
    # F2 fix — the parent-era $1F00 size silently overlapped $1DE0-$1DFF).
    RAM:    start = $0100,    size = $1CE0, type = rw, define = yes;

    # TAD BSS variables (Tad_flags, TadPrivate_state, transfer pointers, etc.)
    # 18 bytes at $1DE0-$1DFF: the TAIL of the kit's game-array region
    # ($1800-$1DFF — see lib/macros/README.md "Game memory contract"). The
    # parent's $0520 placement collides with the text engine's VWF scratch —
    # KIT-OWNED relocation, do not copy the parent value back.
    TAD_BSS: start = $1DE0,   size = $0020, type = rw, define = yes;

    # Bank 0: Main code ($00:8000-$00:FFBF, 32,192 bytes)
    ROM0:   start = $008000,  size = $7FC0, type = ro, file = %O, fill = yes, fillval = $00;
    # Internal ROM header ($00:FFC0-$00:FFDF, 32 bytes)
    ROMH:   start = $00FFC0,  size = $0020, type = ro, file = %O, fill = yes;
    # Interrupt vectors ($00:FFE0-$00:FFFF, 32 bytes)
    ROMV:   start = $00FFE0,  size = $0020, type = ro, file = %O, fill = yes;

    # Banks 1-15 (BANK1 = seed, BANK2..BANK9 = flat tilemap, $0A = audio, spare)
    ROM1:   start = $018000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM2:   start = $028000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM3:   start = $038000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM4:   start = $048000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM5:   start = $058000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM6:   start = $068000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM7:   start = $078000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM8:   start = $088000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM9:   start = $098000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROMA:   start = $0A8000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROMB:   start = $0B8000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROMC:   start = $0C8000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROMD:   start = $0D8000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROME:   start = $0E8000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROMF:   start = $0F8000,  size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE:     load = TAD_ZP, type = zp;
    BSS:          load = TAD_BSS, type = bss;
    CODE:         load = ROM0,  type = ro,   define = yes;
    RODATA:       load = ROM0,  type = ro;
    HEADER:       load = ROMH,  type = ro;
    VECTORS:      load = ROMV,  type = ro;
    BANK1:        load = ROM1,  type = ro,   define = yes, optional = yes;
    BANK2:        load = ROM2,  type = ro,   define = yes, optional = yes;
    BANK3:        load = ROM3,  type = ro,   define = yes, optional = yes;
    BANK4:        load = ROM4,  type = ro,   define = yes, optional = yes;
    BANK5:        load = ROM5,  type = ro,   define = yes, optional = yes;
    BANK6:        load = ROM6,  type = ro,   define = yes, optional = yes;
    BANK7:        load = ROM7,  type = ro,   define = yes, optional = yes;
    BANK8:        load = ROM8,  type = ro,   define = yes, optional = yes;
    BANK9:        load = ROM9,  type = ro,   define = yes, optional = yes;
    AUDIO_DATA0:  load = ROMA,  type = ro,   define = yes;
    # optional: the shipped example song set fits in bank $0A; a bigger TAD
    # project spills its data here without a config edit (tad-compiler emits
    # AUDIO_DATA1 only when needed).
    AUDIO_DATA1:  load = ROMB,  type = ro,   define = yes, optional = yes;
    BANKC:        load = ROMC,  type = ro,   define = yes, optional = yes;
    BANKD:        load = ROMD,  type = ro,   define = yes, optional = yes;
    BANKE:        load = ROME,  type = ro,   define = yes, optional = yes;
    BANKF:        load = ROMF,  type = ro,   define = yes, optional = yes;
}
