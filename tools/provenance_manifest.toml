# =============================================================================
# provenance_manifest.toml — SSoT for every committed asset blob + data table.
# =============================================================================
# Enforced by tools/provenance_check.py (the reproducible-assets gate). Every
# binary/asset blob and every large `.byte`/`.word` data table in the
# MATERIALIZED kit MUST match exactly one `[[asset]]` entry below; an enumerated
# blob with no entry FAILS the gate (the rip-detector). See the policy doc
# docs/cleanroom_policy.md (ships in the kit) for the risk model + control stack.
#
# Entry shape:
#   path          glob (fnmatch) matched against the posix rel-path.
#   kind          one of:
#                   "generator"   — reproducible from a committed generator.
#                                   With `regenerate`: the gate re-runs that
#                                   command in a sandbox copy and byte-diffs
#                                   the `produces` outputs (the STRONG proof).
#                                   Without `regenerate`: coverage-only — the
#                                   `generator` file must exist in-tree and the
#                                   asset carries a generated-by header (used
#                                   where in-gate regen needs external zip
#                                   extraction; the chain is still complete via
#                                   the third-party source zip + the header).
#                   "third-party" — vendored; must have a matching NOTICE entry
#                                   (verified against `notice_token`).
#                   "attested"    — known-non-regenerable first-party content
#                                   (hand-authored config/art); requires `note`.
#                   "artifact"    — committed verification render/screenshot
#                                   (proof of a build, not a shipping asset);
#                                   requires `note`.
#   regenerate    shell command, run from the kit root with PYTHONPATH=. set.
#   produces      globs the command writes (default: [path]); each is diffed.
#   generator     (coverage-only) the in-tree generator file that must exist.
#   notice_token  (third-party) substring that must appear in NOTICE.
#   note          (attested/artifact) provenance explanation.
# =============================================================================

# -----------------------------------------------------------------------------
